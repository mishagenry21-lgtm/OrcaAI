<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Orca AI</title>

<style>

:root{
--bg:#0f0f0f;
--text:#ffffff;
--user:#2f2f2f;
--input:#1e1e1e;
--accent:#ffffff;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:Arial, sans-serif;
display:flex;
flex-direction:column;
height:100vh;
}

/* TOP BAR */

.top{
display:flex;
justify-content:flex-end;
padding:10px;
}

.menuBtn{
font-size:22px;
cursor:pointer;
}

/* CHAT */

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.start{
text-align:center;
opacity:0.9;
margin-top:20vh;
}

.msg{
max-width:75%;
padding:12px 14px;
border-radius:14px;
white-space:pre-wrap;
animation:fade 0.4s ease;
}

.user{
align-self:flex-end;
background:var(--user);
}

.ai{
align-self:flex-start;
}

/* INPUT */

.inputArea{
display:flex;
align-items:center;
gap:10px;
padding:10px;
}

.plus{
width:36px;
height:36px;
border-radius:50%;
background:#2a2a2a;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

.inputBox{
flex:1;
background:var(--input);
border-radius:30px;
display:flex;
align-items:center;
padding:6px 10px;
}

textarea{
flex:1;
background:none;
border:none;
outline:none;
color:var(--text);
resize:none;
font-size:15px;
padding:8px;
max-height:120px;
}

.send{
width:36px;
height:36px;
border-radius:50%;
border:none;
font-size:18px;
cursor:pointer;
background:#555;
color:white;
}

.send.active{
background:white;
color:black;
}

/* THINKING DOTS */

.dots{
display:flex;
gap:5px;
}

.dot{
width:6px;
height:6px;
border-radius:50%;
background:white;
animation:bounce 1s infinite;
}

.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}

@keyframes bounce{
0%,80%,100%{transform:translateY(0)}
40%{transform:translateY(-6px)}
}

@keyframes fade{
from{opacity:0; transform:translateY(6px)}
to{opacity:1}
}

/* MENU */

.menu{
position:fixed;
top:50px;
right:10px;
background:#1e1e1e;
border-radius:10px;
padding:10px;
display:none;
flex-direction:column;
gap:8px;
}

.menu button{
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
}

.blue{background:#1976ff;color:white}
.white{background:white}
.black{background:black;color:white}

</style>
</head>

<body>

<div class="top">
<div class="menuBtn" onclick="toggleMenu()">⋮</div>
</div>

<div id="chat">

<div class="start">
<h2>Привет, я Orca AI.</h2>
<p>Чем могу помочь вам сегодня?</p>
</div>

</div>

<div class="inputArea">

<div class="plus">+</div>

<div class="inputBox">
<textarea id="input" rows="1" placeholder="Спросить Orca AI"></textarea>
<button id="send" class="send">➤</button>
</div>

</div>

<div class="menu" id="menu">
<button class="blue" onclick="theme('blue')">Синяя</button>
<button class="white" onclick="theme('white')">Белая</button>
<button class="black" onclick="theme('black')">Чёрная</button>
</div>

<script>

const API_KEY = "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"

const input=document.getElementById("input")
const send=document.getElementById("send")
const chat=document.getElementById("chat")

input.addEventListener("input",()=>{
if(input.value.trim()){
send.classList.add("active")
}else{
send.classList.remove("active")
}
})

send.onclick=()=>sendMsg()

input.addEventListener("keypress",(e)=>{
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault()
sendMsg()
}
})

function addMsg(text,type){

document.querySelector(".start")?.remove()

let div=document.createElement("div")
div.className="msg "+type
div.textContent=text

chat.appendChild(div)
chat.scrollTop=chat.scrollHeight

return div
}

function thinking(){

let div=document.createElement("div")
div.className="msg ai"

div.innerHTML='<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>'

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

return div
}

async function sendMsg(){

let text=input.value.trim()

if(!text) return

addMsg(text,"user")

input.value=""
send.classList.remove("active")

let think=thinking()

let res=await fetch("https://openrouter.ai/api/v1/chat/completions",{

method:"POST",

headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},

body:JSON.stringify({

model:"meta-llama/llama-3-8b-instruct",

messages:[{role:"user",content:text}]

})

})

let data=await res.json()

think.remove()

typeText(data.choices[0].message.content)

}

function typeText(text){

let div=document.createElement("div")
div.className="msg ai"

chat.appendChild(div)

let i=0

let interval=setInterval(()=>{

div.textContent+=text[i]

i++

chat.scrollTop=chat.scrollHeight

if(i>=text.length){
clearInterval(interval)
}

},15)

}

/* MENU */

function toggleMenu(){

let m=document.getElementById("menu")

m.style.display=m.style.display==="flex"?"none":"flex"

}

/* THEMES */

function theme(t){

if(t==="white"){
document.documentElement.style.setProperty("--bg","#ffffff")
document.documentElement.style.setProperty("--text","#000000")
}

if(t==="black"){
document.documentElement.style.setProperty("--bg","#0f0f0f")
document.documentElement.style.setProperty("--text","#ffffff")
}

if(t==="blue"){
document.documentElement.style.setProperty("--bg","#0d1b2a")
document.documentElement.style.setProperty("--text","#ffffff")
}

toggleMenu()

}

</script>

</body>
  </html>
