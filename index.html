<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Orca AI</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">

<style>

body{
margin:0;
background:#0a0a0a;
color:white;
font-family:sans-serif;
display:flex;
flex-direction:column;
height:100vh;
}

#chat{
flex:1;
overflow-y:auto;
padding:10px;
}

.message{
padding:10px;
margin:6px;
border-radius:10px;
max-width:80%;
word-wrap:break-word;
}

.user{
background:#1f1f1f;
margin-left:auto;
}

.ai{
background:#111;
}

#inputArea{
display:flex;
border-top:1px solid #222;
}

#message{
flex:1;
padding:12px;
background:#111;
color:white;
border:none;
outline:none;
}

button{
background:#222;
color:white;
border:none;
padding:12px 18px;
cursor:pointer;
}

button:hover{
background:#333;
}

</style>

</head>

<body>

<div id="chat"></div>

<div id="inputArea">
<input id="message" placeholder="Напиши сообщение...">
<button onclick="sendMessage()">➤</button>
</div>

<script>

const API_KEY = "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"

function addMessage(text,type){

let chat=document.getElementById("chat")

let div=document.createElement("div")

div.className="message "+type

div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

async function sendMessage(){

let input=document.getElementById("message")

let text=input.value

if(!text) return

addMessage(text,"user")

input.value=""

addMessage("ИИ думает...","ai")

let response=await fetch("https://openrouter.ai/api/v1/chat/completions",{

method:"POST",

headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},

body:JSON.stringify({

model:"meta-llama/llama-3-8b-instruct",

messages:[
{role:"user",content:text}
]

})

})

let data=await response.json()

document.querySelector(".ai:last-child").innerText =
data.choices[0].message.content

}

</script>

</body>
</html>
